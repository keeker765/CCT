model_name: "unsloth/Llama-3.2-1B"

# 预训练层映射
pretrained_front_layers: [0, 1]
pretrained_column_layers: [2, 3, 4]
pretrained_back_layers: [14, 15]

# 维度 (从基座模型自动获取, 此处仅作参考)
hidden_dim: 2048
head_dim: 64
num_q_heads: 32
num_kv_heads: 8
d_ff: 8192

# 循环参数
min_iter: 1
max_iter: 10
phi: 1.618

# L6 Precision
lambda_precision_init: 1.0
precision_temperature: 0.5

# HaltHead 退火
halt_tau_start: 1.0
halt_tau_end: 0.01

# 损失权重
lambda_pred: 0.1
lambda_flops: 0.01

# Cross-Layer FFN Fusion (widen_mode="cross" 已是默认值)
use_ffn_expansion: true
column_d_ff: 16384
donor_init_scale: 0.1

# 训练 (G4 instance, 96GB VRAM, CPT)
learning_rate: 1.0e-4
new_module_lr: 5.0e-4
per_device_batch_size: 32
gradient_accumulation_steps: 4
max_seq_len: 2048
gradient_checkpointing: true
bf16: true
max_steps: 3800
warmup_steps: 200
weight_decay: 0.01
max_grad_norm: 1.0
min_lr_ratio: 0.1

# 数据: 50% FinePDFs + 30% DCLM + 20% FineWeb-Edu (streaming + Packing)
datasets:
  - name: "codelion/finepdfs-1B"
    prob: 0.5
  - name: "codelion/dclm-baseline-1B"
    prob: 0.3
  - name: "codelion/fineweb-edu-1B"
    prob: 0.2
data_strategy: "packing"
total_tokens: 1_000_000_000

# 日志
logging_steps: 50
save_steps: 500
eval_steps: 200
output_dir: "output/cct_cpt"
report_to: "wandb"
run_name: "cct-llama-1b-cpt-v2"
