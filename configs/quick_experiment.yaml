model_name: "unsloth/Llama-3.2-1B"

# 预训练层映射
pretrained_front_layers: [0, 1]
pretrained_column_layers: [2, 3, 4]
pretrained_back_layers: [14, 15]

# 维度
hidden_dim: 2048
head_dim: 64
num_q_heads: 32
num_kv_heads: 8
d_ff: 8192

# 循环参数
min_iter: 1
max_iter: 5
phi: 1.618

# L6 Precision
lambda_precision_init: 1.0
precision_temperature: 0.5

# HaltHead 退火
halt_tau_start: 1.0
halt_tau_end: 0.01

# 损失权重
lambda_pred: 0.1
lambda_flops: 0.01

# 训练 (8GB VRAM 快速实验)
learning_rate: 2.0e-5
new_module_lr: 1.0e-4
per_device_batch_size: 1
gradient_accumulation_steps: 4
max_seq_len: 256
gradient_checkpointing: true
bf16: true
max_steps: 100
warmup_steps: 10
weight_decay: 0.01
max_grad_norm: 1.0

# 数据 (wikitext 小数据集, 快速下载)
dataset_name: "wikitext"
dataset_config: "wikitext-2-raw-v1"
dataset_split: "train"
max_samples: 500

# 日志
logging_steps: 5
save_steps: 50
eval_steps: 50
output_dir: "output/quick_experiment"
run_name: "cct-quick-experiment"
